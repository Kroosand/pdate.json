name: Sync WispHub to Supabase

on:
  schedule:
    - cron: '*/15 * * * *'  # Se ejecuta cada 15 minutos
  workflow_dispatch:      # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary

    - name: Run sync script
      env:
        WISPHUB_API_URL: ${{ secrets.WISPHUB_API_URL }}
        WISPHUB_API_KEY: ${{ secrets.WISPHUB_API_KEY }}
        USA_SUPABASE_URL: ${{ secrets.USA_SUPABASE_URL }}
        USA_SUPABASE_KEY: ${{ secrets.USA_SUPABASE_KEY }}
      run: python sync_wisphub.py
